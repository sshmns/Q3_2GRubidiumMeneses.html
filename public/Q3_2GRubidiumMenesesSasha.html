<!DOCTYPE html>
<html lang="en">

<head>
  <title>HTML Form Sign-up</title>

  <meta name="description" content="A website of a form sign-up.">
  <meta name="author" content="Victoria Sasha R. Meneses">

  <style>
    body {
        background-color: #0d0f2b;
        font-family: 'Poppins', sans-serif;
        color: #f0e6e6;
        margin: 0;
        padding: 40px 0;
        text-align: center;
    }

    h1 {
        font-family: 'Orbitron', sans-serif;
        color: #3394da;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 25px;
        text-shadow: 3px 3px #1a0000;
    }

    form {
        width: 680px;
        margin: auto;
        background-color: #2e59aa;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(0,0,0,0.6);
        border: 2px solid #2e59aa;
    }

    fieldset {
        border: 2px solid #2e59aa;
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 25px;
    }

    legend {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.8rem;
        color: #b3e3ff;
        padding: 0 10px;
        text-shadow: 2px 2px rgb(19, 30, 154);
    }

    label {
        display: block;
        text-align: left;
        margin-bottom: 15px;
        font-size: 0.95rem;
    }

    input, select, textarea {
        width: 100%;
        padding: 8px;
        margin-top: 6px;
        background-color: #4162ba;
        border: 2px solid #2e59aa;
        border-radius: 8px;
        color: #f5e6e6;
        font-family: 'Poppins', sans-serif;
    }

    textarea {
        resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #231d7c;
        background-color: #5d6bd5;
        box-shadow: 0 0 8px rgba(45, 87, 150, 0.7);
    }

    .invalid {
        border-color: #4d68b8;
        background-color: #040080;
    }

    .radio-group {
        display: flex;
        gap: 25px;
        margin-top: 8px;
    }

    .radio-group label {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 0;
        cursor: pointer;
    }

    .radio-group input {
        width: auto;
        margin: 0;
    }

    .buttons {
        text-align: center;
        margin-top: 15px;
    }

    button {
        background-color: #0f0080;
        color: #fceaea;
        border: 2px solid #00094d;
        border-radius: 10px;
        padding: 10px 20px;
        margin: 5px;
        font-family: 'Poppins', sans-serif;
        font-size: 1rem;
        cursor: pointer;
        transition: transform 0.2s ease, background-color 0.3s ease;
    }

    button:hover {
        background-color: #3950e6;
        transform: scale(1.05);
    }
</style>

<script>
    function confirmSubmit() {
        return confirm("Are you sure you want to submit this form?");
    }

    function confirmReset() {
        return confirm("Are you sure you want to reset all information?");
    }

    function checkEmpty(element) {
        if (element.value.trim() === "") {
            element.classList.add("invalid");
        } else {
            element.classList.remove("invalid");
        }
    }
</script>
</head>

<body>

<form method="post" action="submit"
      onsubmit="return confirmSubmit()"
      onreset="return confirmReset()">

    <fieldset>
        <legend>Information</legend>

        <label>
            Student ID:
            <input type="number" name="student_id" inputmode="numeric" step="1" required>
        </label>

        <label>
            Full Name:
            <input type="text" name="full_name" required onblur="checkEmpty(this)">
        </label>

        <label>
            Birthday:
            <input type="date" name="birthday" required>
        </label>

        <label>
            Email Address:
            <input type="email" name="email" required>
        </label>
    </fieldset>

    <fieldset>
        <legend>Details</legend>

        <label>
            Mobile Phone:
            <input type="text" name="mobile" required onblur="checkEmpty(this)">
        </label>

        <label>
            Grade Level:
            <select name="grade_level" required>
                <option value="">Select</option>
                <option value="g7">Grade 7</option>
                <option value="g8">Grade 8</option>
                <option value="g9">Grade 9</option>
                <option value="g10">Grade 10</option>
                <option value="g11">Grade 11</option>
                <option value="g12">Grade 12</option>
            </select>
        </label>

        <label>
            Intern / Extern:
            <div class="radio-group">
                <label>
                    <input type="radio" name="status" value="internal" required>
                    Intern
                </label>
                <label>
                    <input type="radio" name="status" value="external" required>
                    Extern
                </label>
            </div>
        </label>

        <label>
            Preferred Organization / Club:
            <select name="club" required>
                <option value="">Select</option>
                <option value="sports">Volant</option>
                <option value="sports">Alianti</option>
                <option value="sports">Pallastro</option>
                <option value="sports">Kislap</option>
                <option value="food">Bake Club</option>
            </select>
        </label>

        <label>
            Why do you want to join?
            <textarea name="reason" rows="4" required onblur="checkEmpty(this)"></textarea>
        </label>
    </fieldset>

    <div class="buttons">
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </div>

</form>

</body>
</html>
