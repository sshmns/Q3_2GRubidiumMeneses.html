<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HTML Sign Up Form</title>

   <style>

        body {
            background:#0d0f2b;
            font-family:Poppins, sans-serif;
            color:#f0e6e6;
            text-align:center;
            padding:40px;
        }

        form {
            width:650px;
            margin:auto;
            background:#2e59aa;
            padding:30px;
            border-radius:15px;
        }

        fieldset {
            border: 2px solid #2e59aa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
        }

        legend {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: #b3e3ff;
            padding: 0 10px;
            text-shadow: 2px 2px rgb(19, 30, 154);
        }

        label {
            display:block;
            text-align:left;
            margin-bottom:15px;
        }

        input, select, textarea {
            width:100%;
            padding:8px;
            margin-top:5px;
            border-radius:6px;
            border:1px solid #ccc;
        }

        input:focus, select:focus, textarea:focus {
            border:2px solid #3950e6;
            background:#eef2ff;
            outline:none;
        }

        .invalid {
            border:2px solid red;
            background:#ffecec;
        }

        .radio-group {
            display:flex;
            gap:20px;
        }

        button {
            background-color: #0f0080;
            color: #fceaea;
            border: 2px solid #00094d;
            border-radius: 10px;
            padding: 10px 20px;
            margin: 5px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.3s ease;
        }

        button:hover {
            background-color: #3950e6;
            transform: scale(1.05);
        }

    </style>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const form = document.getElementById("dForm");
    const resetBtn = document.querySelector("button[type='reset']");
    const viewBtn = document.getElementById("view");

    form.addEventListener("submit", function (event) {
        if (!confirm("Are you sure you want to submit this form?")) {
            event.preventDefault();
            return;
        }

        let signupString = localStorage.getItem("clubsignups");
        let signupsList = signupString ? JSON.parse(signupString) : {};

        let sid = document.getElementById("sid").value;

        signupsList[sid] = {
            fname: document.getElementById("fname").value,
            grade: document.querySelector("select[name='grade']").value,
            semail: document.getElementById("semail").value,
            phone: document.getElementById("phone").value,
            inex: document.querySelector("input[name='inex']:checked") ? 
                  document.querySelector("input[name='inex']:checked").value : "",
            clubs: document.querySelector("select[name='clubs']").value
        };

        localStorage.setItem("clubsignups", JSON.stringify(signupsList));
    });

    resetBtn.addEventListener("click", function (event) {
        if (!confirm("Are you sure you want to reset all information?")) {
            event.preventDefault();
        }
    });

    viewBtn.addEventListener("click", function () {
        window.location.href = "viewSignUps.html";
    });

    const inputs = document.querySelectorAll("input[required], textarea[required]");
    inputs.forEach(function (input) {
        input.addEventListener("blur", function () {
            if (input.value.trim() === "") {
                input.classList.add("invalid");
            } else {
                input.classList.remove("invalid");
            }
        });
    });

});
</script>
  </head>
  <body>
    <section>
      <h1 class="title">Sign-up Page <br/>
        <button type="button" id="view"> View Sign-Ups </button>
      </h1>
      <form id="dForm" method="get">
        <fieldset>
          <legend>Your Information</legend>
          <label> Student ID: 
            <input onfocus="changeColor(this)" onblur="resetColor(this)" type="text" name="sid" id="sid" required />
          </label>
          <label> FullName :
            <input onfocus="changeColor(this)" onblur="resetColor(this)" type="text" name="fname" id="fname" required />
          </label>
          <label> Date Of Birth :
            <input type="date" name="dob" id="dob" />
          </label>
          <label> Email :
            <input onfocus="changeColor(this)" onblur="resetColor(this)" type="email" name="semail" id="semail" required />
          </label>
          <label> Mobile Phone :
            <input onfocus="changeColor(this)" onblur="resetColor(this)" type="text" name="phone" id="phone" pattern="[0-9]{11}" placeholder="Type in your 11 digit Mobile Phone Number" required />
          </label>
          <label> Select Your Grade Level
            <select name="grade">
              <option disabled selected value> -- select an option -- </option>
              <option value="Grade 7"> Grade 7 </option>
              <option value="Grade 8"> Grade 8 </option>
              <option value="Grade 9"> Grade 9 </option>
              <option value="Grade 10"> Grade 10 </option>
              <option value="Grade 11"> Grade 11 </option>
              <option value="Grade 12"> Grade 12 </option>
            </select>
          </label>
          <label>Intern / Extern:
            <div class="radio-group">
              <label>
                <input type="radio" name="inex" value="Intern" /> Intern
              </label>
              <label>
                <input type="radio" name="inex" value="Extern" /> Extern
              </label>
            </div>
          </label>
          <label> Select Your Club
            <select name="clubs">
              <option disabled selected value> -- select an option -- </option>
              <option value="Volant"> Volant </option>
              <option value="Alianti"> Alianti </option>
              <option value="Pallastro"> Pallastro </option>
              <option value="Kislap"> Kislap </option>
              <option value="Bake Club"> Bake Club </option>
            </select>
          </label>
          <label> Why do you want to join : 
            <textarea name="about" id="about"></textarea>
          </label>
        </fieldset>  
        <fieldset>
          <div class="buttons">
            <button type="submit">Submit</button>
            <button type="reset">Clear</button>
          </div>
        </fieldset> 
      </form>
    </section>
  </body>
</html>
