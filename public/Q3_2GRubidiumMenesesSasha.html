<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>HTML Sign Up Form</title>

<style>

body{
    background-color:#0d0f2b;
    font-family:Poppins, sans-serif;
    color:#f0e6e6;
    text-align:center;
    padding:40px;
}

form{
    width:650px;
    margin:auto;
    background:#2e59aa;
    padding:30px;
    border-radius:15px;
}

fieldset{
    border:2px solid #2e59aa;
    margin-bottom:20px;
    padding:20px;
}

legend{
    font-size:1.5rem;
}

label{
    display:block;
    text-align:left;
    margin-bottom:15px;
}

input, select, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* focus style required by teacher */
input:focus, select:focus, textarea:focus{
    border:2px solid #3950e6;
    background-color:#eef2ff;
    outline:none;
}

/* style for empty fields */
.invalid{
    border:2px solid red;
    background:#ffecec;
}

button{
    padding:10px 20px;
    margin:5px;
    cursor:pointer;
}

.radio-group{
    display:flex;
    gap:20px;
}

</style>

<script>

function confirmReset(){
    return confirm("Are you sure you want to reset all information?");
}

function checkEmpty(element){
    if(element.value.trim()===""){
        element.classList.add("invalid");
    }else{
        element.classList.remove("invalid");
    }
}

function saveSignup(event){

    event.preventDefault();

    if(!confirm("Are you sure you want to submit this application?")){
        return false;
    }

    let selectedStatus=document.querySelector("input[name='status']:checked");

    if(!selectedStatus){
        alert("Please select Intern or Extern.");
        return false;
    }

    let signup={

        studentID:document.getElementById("studentID").value,
        fullName:document.getElementById("fullName").value,
        birthday:document.getElementById("birthday").value,
        email:document.getElementById("email").value,
        phone:document.getElementById("mobile").value,
        grade:document.getElementById("gradeLevel").value,
        status:selectedStatus.value,
        club:document.getElementById("club").value,
        reason:document.getElementById("reason").value

    };

    let signups=JSON.parse(localStorage.getItem("signups")) || [];

    signups.push(signup);

    localStorage.setItem("signups",JSON.stringify(signups));

    alert("Application saved successfully!");

    document.getElementById("signupForm").reset();

    return false;
}

</script>

</head>

<body>

<h1>Club Application Form</h1>

<form id="signupForm"
method="post"
action="submit"
onsubmit="return saveSignup(event)"
onreset="return confirmReset()">

<fieldset>

<legend>Student Information</legend>

<label>
Student ID
<input type="number" id="studentID" name="student_id" required>
</label>

<label>
Full Name
<input type="text" id="fullName" name="full_name" required onblur="checkEmpty(this)">
</label>

<label>
Birthday
<input type="date" id="birthday" name="birthday" required>
</label>

<label>
Email Address
<input type="email" id="email" name="email" required>
</label>

</fieldset>

<fieldset>

<legend>Application Details</legend>

<label>
Mobile Phone
<input type="text" id="mobile" name="mobile" required onblur="checkEmpty(this)">
</label>

<label>
Grade Level
<select id="gradeLevel" name="grade_level" required>
<option value="">Select</option>
<option value="g7">Grade 7</option>
<option value="g8">Grade 8</option>
<option value="g9">Grade 9</option>
<option value="g10">Grade 10</option>
<option value="g11">Grade 11</option>
<option value="g12">Grade 12</option>
</select>
</label>

<label>
Intern / Extern
<div class="radio-group">

<label>
<input type="radio" name="status" value="internal" required>
Intern
</label>

<label>
<input type="radio" name="status" value="external" required>
Extern
</label>

</div>
</label>

<label>
Preferred Organization / Club
<select id="club" name="club" required>

<option value="">Select</option>
<option value="volant">Volant</option>
<option value="allianti">Alianti</option>
<option value="pallastro">Pallastro</option>
<option value="kislap">Kislap</option>
<option value="bakeclub">Bake Club</option>

</select>
</label>

<label>
Why do you want to join?
<textarea id="reason" name="reason" rows="4" required onblur="checkEmpty(this)"></textarea>
</label>

</fieldset>

<button type="submit">Submit</button>
<button type="reset">Reset</button>

</form>

</body>
</html>
