<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HTML Sign Up Form</title>

    <style>

        body {
            background:#0d0f2b;
            font-family:Poppins, sans-serif;
            color:#f0e6e6;
            text-align:center;
            padding:40px;
        }

        form {
            width:650px;
            margin:auto;
            background:#2e59aa;
            padding:30px;
            border-radius:15px;
        }

        fieldset {
            border: 2px solid #2e59aa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
        }

        legend {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: #b3e3ff;
            padding: 0 10px;
            text-shadow: 2px 2px rgb(19, 30, 154);
        }

        label {
            display:block;
            text-align:left;
            margin-bottom:15px;
        }

        input, select, textarea {
            width:100%;
            padding:8px;
            margin-top:5px;
            border-radius:6px;
            border:1px solid #ccc;
        }

        input:focus, select:focus, textarea:focus {
            border:2px solid #3950e6;
            background:#eef2ff;
            outline:none;
        }

        .invalid {
            border:2px solid red;
            background:#ffecec;
        }

        .radio-group {
            display:flex;
            gap:20px;
        }

        button {
            background-color: #0f0080;
            color: #fceaea;
            border: 2px solid #00094d;
            border-radius: 10px;
            padding: 10px 20px;
            margin: 5px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.3s ease;
        }

        button:hover {
            background-color: #3950e6;
            transform: scale(1.05);
        }

    </style>

    <script>

        function confirmReset() {
            return confirm("Are you sure you want to reset all information?");
        }

        function checkEmpty(el) {
            if (el.value.trim() === "") {
                el.classList.add("invalid");
            } else {
                el.classList.remove("invalid");
            }
        }

        function saveSignup() {

            if (!confirm("Are you sure you want to submit this application?")) {
                return false;
            }

            let selected = document.querySelector("input[name='status']:checked");

            if (!selected) {
                alert("Please select Intern or Extern.");
                return false;
            }

            let signup = {
                studentID: document.getElementById("studentID").value,
                fullName: document.getElementById("fullName").value,
                birthday: document.getElementById("birthday").value,
                email: document.getElementById("email").value,
                phone: document.getElementById("mobile").value,
                grade: document.getElementById("gradeLevel").value,
                status: selected.value,
                club: document.getElementById("club").value,
                reason: document.getElementById("reason").value
            };

            let signups = JSON.parse(localStorage.getItem("signups")) || [];

            signups.push(signup);

            localStorage.setItem("signups", JSON.stringify(signups));

            alert("Application saved successfully!");

            document.getElementById("signupForm").reset();

            return true;
        }

    </script>

</head>

<body>

    <h1>Club Sign Up Form</h1>

    <iframe name="hiddenFrame" style="display:none;"></iframe>

    <form
        id="signupForm"
        method="post"
        action="submit"
        target="hiddenFrame"
        onsubmit="return saveSignup()"
        onreset="return confirmReset()"
    >

        <fieldset>

            <legend>Student Information</legend>

            <label>
                Student ID
                <input type="number" id="studentID" name="student_id" required>
            </label>

            <label>
                Full Name
                <input type="text" id="fullName" name="full_name" required onblur="checkEmpty(this)">
            </label>

            <label>
                Birthday
                <input type="date" id="birthday" name="birthday" required>
            </label>

            <label>
                Email Address
                <input type="email" id="email" name="email" required>
            </label>

        </fieldset>

        <fieldset>

            <legend>Application Details</legend>

            <label>
                Mobile Phone
                <input type="text" id="mobile" name="mobile" required onblur="checkEmpty(this)">
            </label>

            <label>
                Grade Level
                <select id="gradeLevel" name="grade_level" required>
                    <option value="">Select</option>
                    <option value="g7">Grade 7</option>
                    <option value="g8">Grade 8</option>
                    <option value="g9">Grade 9</option>
                    <option value="g10">Grade 10</option>
                    <option value="g11">Grade 11</option>
                    <option value="g12">Grade 12</option>
                </select>
            </label>

            <label>
                Intern / Extern:
                <div class="radio-group">
                    <label>
                        <input type="radio" name="status" value="internal" required>
                        Intern
                    </label>
                    <label>
                        <input type="radio" name="status" value="external" required>
                        Extern
                    </label>
                </div>
            </label>

            <label>
                Preferred Organization / Club
                <select id="club" name="club" required>

                    <option value="">Select</option>
                    <option value="volant">Volant</option>
                    <option value="allianti">Alianti</option>
                    <option value="pallastro">Pallastro</option>
                    <option value="kislap">Kislap</option>
                    <option value="bakeclub">Bake Club</option>

                </select>
            </label>

            <label>
                Why do you want to join?
                <textarea
                    id="reason"
                    name="reason"
                    rows="4"
                    required
                    onblur="checkEmpty(this)"
                ></textarea>
            </label>

        </fieldset>

        <button type="submit">Submit</button>
        <button type="reset">Reset</button>

    </form>

</body>
</html>
